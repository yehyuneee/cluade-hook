name: sample
displayName: "Sample Preset"
description: "A sample preset for testing"
version: "1.0.0"
extends: []
tags: ["sample", "test"]
variables:
  language: "typescript"
  testRunner: "vitest"
claudeMd:
  sections:
    - id: "sample-rules"
      title: "Sample Rules"
      content: |
        ## Sample Rules
        - Follow TDD workflow
        - Write tests before implementation
      priority: 20
hooks:
  preToolUse:
    - id: "sample-guard"
      matcher: "Bash"
      description: "Sample pre-tool guard"
      inline: |
        #!/bin/bash
        exit 0
settings:
  permissions:
    allow:
      - "Bash(npm test*)"
    deny:
      - "Bash(rm -rf /)"
